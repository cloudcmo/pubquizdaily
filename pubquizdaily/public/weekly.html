<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Round-up — Pub Quiz Daily</title>
  <meta name="description" content="Seven questions from the last seven days. How many can you get right?" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://pubquizdaily.com/weekly.html" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf9f7;
      --ink: #1a1a1a;
      --ink-light: #6b6b6b;
      --ink-faint: #c8c8c8;
      --border: #e0ddd8;
      --correct: #4a7c59;
      --correct-bg: #edf4ef;
      --wrong: #c0622e;
      --wrong-bg: #fdf0eb;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }

    .today-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-light);
      text-decoration: none;
    }
    .today-link:hover { color: var(--ink); }

    main {
      flex: 1;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 24px 60px;
    }

    .page-header {
      margin-bottom: 36px;
    }

    .week-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 8px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 0.9375rem;
      color: var(--ink-light);
    }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 32px;
      position: sticky;
      top: 12px;
      z-index: 10;
    }

    .score-pips {
      display: flex;
      gap: 5px;
    }

    .pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }

    .pip.correct { background: var(--correct); }
    .pip.wrong { background: var(--wrong); }

    .score-label {
      font-size: 0.875rem;
      color: var(--ink-light);
      margin-left: auto;
    }

    .score-number {
      font-weight: 600;
      color: var(--ink);
    }

    /* Question cards */
    .questions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .question-card.answered-correct { border-color: var(--correct); }
    .question-card.answered-wrong { border-color: var(--wrong); }

    .q-meta {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }

    .q-text {
      font-family: var(--font-serif);
      font-size: 1.0625rem;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 14px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--ink);
      transition: border-color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn:hover:not(:disabled) { border-color: var(--ink); }
    .option-btn:disabled { cursor: default; }

    .option-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      font-size: 0.6875rem;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--ink-light);
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .option-btn.correct {
      background: var(--correct-bg);
      border-color: var(--correct);
    }
    .option-btn.correct .option-letter {
      background: var(--correct);
      border-color: var(--correct);
      color: white;
    }
    .option-btn.correct .option-text { color: var(--correct); font-weight: 500; }

    .option-btn.wrong {
      background: var(--wrong-bg);
      border-color: var(--wrong);
    }
    .option-btn.wrong .option-letter {
      background: var(--wrong);
      border-color: var(--wrong);
      color: white;
    }
    .option-btn.wrong .option-text { color: var(--wrong); }
    .option-btn.muted { opacity: 0.38; }

    .explainer {
      margin-top: 10px;
      font-size: 0.8125rem;
      color: var(--ink-light);
      line-height: 1.5;
      display: none;
    }
    .explainer.visible { display: block; }

    /* Final score panel */
    .final-panel {
      margin-top: 32px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
      display: none;
    }

    .final-panel.visible { display: block; }

    .final-score {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .final-out-of {
      font-size: 0.875rem;
      color: var(--ink-light);
      margin-bottom: 16px;
    }

    .final-message {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.125rem;
      margin-bottom: 20px;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 28px;
      background: #2d6a4f;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .share-btn:hover { background: #1e4d38; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 48px 0;
      color: var(--ink-light);
      font-size: 0.875rem;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-faint);
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }


    /* ── Email signup ── */
    .email-signup {
      margin-top: 48px;
      border-top: 1px solid var(--border);
      padding-top: 28px;
      text-align: center;
    }

    .email-signup.hidden { display: none; }

    .signup-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-light);
      margin-bottom: 10px;
    }

    .signup-row {
      display: flex;
      gap: 8px;
      max-width: 340px;
      margin: 0 auto;
    }

    .signup-input {
      flex: 1;
      padding: 10px 14px;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    .signup-input:focus { border-color: var(--ink); }

    .signup-btn {
      padding: 10px 16px;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .signup-btn:hover { opacity: 0.8; }
    .signup-btn:disabled { opacity: 0.5; cursor: default; }

    .signup-confirm {
      font-size: 0.8125rem;
      color: var(--correct);
      font-weight: 500;
      display: none;
      margin-top: 8px;
    }

    .signup-confirm.visible { display: block; }
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 16px 24px;
      font-size: 0.75rem;
      color: var(--ink-faint);
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">Pub Quiz Daily</a>
    <div style="display:flex;align-items:center;gap:20px;">
      <a class="today-link" href="/archive.html">Full archive</a>
      <a class="today-link" href="/">Today's question →</a>
    </div>
  </header>

  <main>
    <div class="page-header">
      <p class="week-label" id="weekLabel">All the questions from</p>
      <h1 class="page-title">Weekly Round-up</h1>
      <p class="page-subtitle">How many do you know?</p>
    </div>

    <div id="app">
      <div class="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        Loading this week's questions…
      </div>
    </div>

    <div class="email-signup" id="emailSignup">
      <p class="signup-label">Get this in your inbox every Friday</p>
      <div class="signup-row">
        <input class="signup-input" type="email" id="signupEmail" placeholder="your@email.com" />
        <button class="signup-btn" id="signupBtn" onclick="submitSignup()">Sign up</button>
      </div>
      <p class="signup-confirm" id="signupConfirm">You're in! See you next Friday. 🍺</p>
    </div>
  </main>

  <footer>One question. Every day. &nbsp;·&nbsp; Pub Quiz Daily</footer>

  <script>
    const LETTERS = ['A', 'B', 'C', 'D'];
    const FINAL_MSGS = [
      [7, "Perfect score — pub quiz royalty. 👑"],
      [6, "Six out of seven — outstanding."],
      [5, "Five out of seven — solid pub quizzer."],
      [4, "Four out of seven — respectable."],
      [3, "Three out of seven — room to improve!"],
      [2, "Two out of seven — better luck next week."],
      [1, "One out of seven — at least you showed up."],
      [0, "Zero out of seven — were you even trying? 😄"],
    ];

    let questions = [];
    let answered = {}; // index → 'correct' | 'wrong'
    let score = 0;

    // Get last 7 days (excluding today)
    function getLast7Dates() {
      const dates = [];
      const today = new Date();
      for (let i = 1; i <= 7; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        dates.push(d.toISOString().slice(0, 10));
      }
      return dates; // newest first
    }

    function formatDateShort(iso) {
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function formatWeekRange(dates) {
      if (!dates.length) return '';
      const oldest = new Date(dates[dates.length - 1] + 'T12:00:00');
      const newest = new Date(dates[0] + 'T12:00:00');
      const opts = { day: 'numeric', month: 'long' };
      return `${oldest.toLocaleDateString('en-GB', opts)} – ${newest.toLocaleDateString('en-GB', opts)}`;
    }

    async function loadQuestions() {
      const dates = getLast7Dates();
      document.getElementById('weekLabel').textContent =
        `Weekly Round-up · ${formatWeekRange(dates)}`;

      const results = await Promise.allSettled(
        dates.map(date =>
          fetch(`/.netlify/functions/question?date=${date}`)
            .then(r => r.ok ? r.json() : null)
        )
      );

      questions = results
        .map((r, i) => r.status === 'fulfilled' && r.value ? { ...r.value, date: dates[i] } : null)
        .filter(Boolean);

      if (questions.length === 0) {
        document.getElementById('app').innerHTML =
          '<p style="color:var(--ink-light);text-align:center;padding:48px 0">No questions found for this week yet.</p>';
        return;
      }

      renderAll();
    }

    function renderAll() {
      const app = document.getElementById('app');

      // Score bar
      const pips = Array(questions.length).fill(0).map((_, i) =>
        `<span class="pip" id="pip-${i}"></span>`
      ).join('');

      app.innerHTML = `
        <div class="score-bar">
          <div class="score-pips">${pips}</div>
          <span class="score-label"><span class="score-number" id="scoreNum">0</span> / ${questions.length}</span>
        </div>
        <div class="questions" id="questionsList"></div>
        <div class="final-panel" id="finalPanel">
          <div class="final-score" id="finalScore">0</div>
          <div class="final-out-of">out of ${questions.length}</div>
          <div class="final-message" id="finalMessage"></div>
          <button class="share-btn" onclick="shareResult()">
            Share my score
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
        </div>
      `;

      const list = document.getElementById('questionsList');
      questions.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `card-${i}`;

        const optionsHtml = q.options.map((text, oi) => `
          <button class="option-btn" data-qi="${i}" data-letter="${LETTERS[oi]}" onclick="handleAnswer(${i}, '${LETTERS[oi]}')">
            <span class="option-letter">${LETTERS[oi]}</span>
            <span class="option-text">${text}</span>
          </button>
        `).join('');

        card.innerHTML = `
          <div class="q-meta">Q${i + 1} · ${formatDateShort(q.date)}</div>
          <div class="q-text">${q.question}</div>
          <div class="options">${optionsHtml}</div>
          ${q.explainer ? `<div class="explainer" id="explainer-${i}">${q.explainer}</div>` : ''}
        `;
        list.appendChild(card);
      });
    }

    function handleAnswer(qi, chosen) {
      if (answered[qi] !== undefined) return;

      const q = questions[qi];
      const isCorrect = chosen === q.correct;
      answered[qi] = isCorrect ? 'correct' : 'wrong';
      if (isCorrect) score++;

      // Update buttons
      const card = document.getElementById(`card-${qi}`);
      card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

      card.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        const letter = btn.dataset.letter;
        if (letter === q.correct) {
          btn.classList.add('correct');
        } else if (letter === chosen && !isCorrect) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('muted');
        }
      });

      // Show explainer
      const exp = document.getElementById(`explainer-${qi}`);
      if (exp) exp.classList.add('visible');

      // Update pip
      const pip = document.getElementById(`pip-${qi}`);
      if (pip) pip.classList.add(isCorrect ? 'correct' : 'wrong');

      // Update score display
      document.getElementById('scoreNum').textContent = score;

      // Check if all answered
      if (Object.keys(answered).length === questions.length) {
        showFinal();
      }
    }

    function showFinal() {
      const panel = document.getElementById('finalPanel');
      document.getElementById('finalScore').textContent = score;
      const msg = FINAL_MSGS.find(([n]) => n === score)?.[1] || '';
      document.getElementById('finalMessage').textContent = msg;
      panel.classList.add('visible');
      panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function shareResult() {
      const emojiRow = questions.map((_, i) =>
        answered[i] === 'correct' ? '🟢' : '🔴'
      ).join('');

      const dates = getLast7Dates();
      const range = formatWeekRange(dates);
      const text = `Pub Quiz Daily — Weekly Round-up\n${range}\n\n${emojiRow}  ${score}/${questions.length}\n\npubquizdaily.com/weekly`;

      if (navigator.share) {
        navigator.share({ title: 'Pub Quiz Daily Weekly Round-up', text }).catch(() => {});
      } else {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.querySelector('.share-btn');
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.innerHTML = 'Share my score <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'; }, 2000);
        });
      }
    }

    loadQuestions();

    // ── Email signup ──────────────────────────────────────────────────
    const SIGNUP_KEY = 'pqd_subscribed';

    function initSignup() {
      if (localStorage.getItem(SIGNUP_KEY)) {
        document.getElementById('emailSignup').classList.add('hidden');
      }
    }

    async function submitSignup() {
      const input = document.getElementById('signupEmail');
      const btn = document.getElementById('signupBtn');
      const confirm = document.getElementById('signupConfirm');
      const email = input.value.trim();
      if (!email || !email.includes('@')) { input.focus(); return; }
      btn.disabled = true;
      btn.textContent = 'Signing up…';
      try {
        const res = await fetch('/.netlify/functions/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        if (res.ok) {
          localStorage.setItem(SIGNUP_KEY, '1');
          input.style.display = 'none';
          btn.style.display = 'none';
          confirm.classList.add('visible');
          document.querySelector('#emailSignup .signup-label').textContent = "You're on the list!";
        } else {
          btn.disabled = false;
          btn.textContent = 'Sign up';
          input.placeholder = 'Something went wrong — try again';
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Sign up';
      }
    }

    initSignup();

  </script>
</body>
</html>
