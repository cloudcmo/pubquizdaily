<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — Pub Quiz Daily</title>
  <meta name="description" content="Play past Pub Quiz Daily questions. Browse the full archive and test yourself on previous daily questions." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://pubquizdaily.com/archive.html" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf9f7;
      --ink: #1a1a1a;
      --ink-light: #6b6b6b;
      --ink-faint: #c8c8c8;
      --border: #e0ddd8;
      --correct: #4a7c59;
      --correct-bg: #edf4ef;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-sans);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }

    .today-link {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-light);
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .today-link:hover { color: var(--ink); }

    main {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 24px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .page-subtitle {
      font-size: 0.875rem;
      color: var(--ink-light);
      margin-bottom: 32px;
    }

    .archive-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .archive-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.12s, transform 0.08s;
    }

    .archive-item:hover {
      border-color: var(--ink);
      transform: translateY(-1px);
    }

    .archive-item.played {
      background: var(--correct-bg);
      border-color: var(--correct);
    }

    .archive-date {
      font-size: 0.9375rem;
      font-weight: 500;
    }

    .archive-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .played-tick {
      font-size: 0.875rem;
      color: var(--correct);
      display: none;
    }

    .archive-item.played .played-tick { display: block; }

    .archive-chevron {
      color: var(--ink-faint);
      font-size: 1rem;
    }

    .loading {
      text-align: center;
      padding: 48px 0;
      color: var(--ink-light);
      font-size: 0.875rem;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-faint);
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 16px 24px;
      font-size: 0.75rem;
      color: var(--ink-faint);
    }

    /* ── Burger menu ── */
    .burger {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 200;
    }
    .burger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--ink);
      border-radius: 2px;
      transition: all 0.2s;
    }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-menu {
      display: none;
      position: absolute;
      top: 56px;
      right: 0;
      left: 0;
      background: white;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 8px 0;
    }
    .nav-menu.open { display: block; }
    .nav-menu a {
      display: block;
      padding: 12px 24px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .nav-menu a:last-child { border-bottom: none; }
    .nav-menu a:hover { background: var(--cream); }
    .nav-menu a.active { color: #4a7c59; }
  </style>
</head>
<body>

  <header style="position:relative;">
    <a class="logo" href="/">Pub Quiz Daily</a>
    <button class="burger" id="burgerBtn" aria-label="Menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-menu" id="navMenu">
      <a href="/">Today's question</a>
      <a href="/groupie.html">Groupie</a>
      <a href="/weekly.html">Weekly quiz</a>
      <a href="/archive.html" class="active">Full archive</a>
    </nav>
  </header>

  <main>
    <h1 class="page-title">Archive</h1>
    <p class="page-subtitle">Past questions — play any one you missed.</p>

    <div id="archiveList">
      <div class="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        Loading past questions…
      </div>
    </div>
  </main>

  <footer>One question. Every day. &nbsp;·&nbsp; Pub Quiz Daily &nbsp;·&nbsp; <a href="mailto:&#104;&#101;&#108;&#108;&#111;&#64;&#112;&#117;&#98;&#113;&#117;&#105;&#122;&#100;&#97;&#105;&#108;&#121;&#46;&#99;&#111;&#109;" style="color:inherit;text-decoration:none;">Send feedback</a></footer>

  <script>
    // First question ever published
    const FIRST_DATE = '2026-03-12';
    const STORAGE_KEY = 'pqd_archive_played';

    // Load which archive dates have been played
    function loadPlayed() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    // Also check main game state for today
    function loadMainState() {
      try { return JSON.parse(localStorage.getItem('pqd_state')) || {}; }
      catch { return {}; }
    }

    function formatDate(iso) {
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function getPastDates() {
      const dates = [];
      const today = new Date().toISOString().slice(0, 10);
      const start = new Date(FIRST_DATE + 'T12:00:00');
      const end = new Date(today + 'T12:00:00');
      end.setDate(end.getDate() - 1); // exclude today

      const cur = new Date(end);
      while (cur >= start) {
        dates.push(cur.toISOString().slice(0, 10));
        cur.setDate(cur.getDate() - 1);
      }
      return dates; // newest first
    }

    function render() {
      const dates = getPastDates();
      const played = loadPlayed();
      const mainState = loadMainState();

      // Mark today if played via main game
      if (mainState.date && mainState.answered) {
        played[mainState.date] = mainState.isCorrect ? 'correct' : 'wrong';
      }

      const list = document.getElementById('archiveList');

      if (dates.length === 0) {
        list.innerHTML = '<p style="color:var(--ink-light);font-size:0.875rem;">No past questions yet — check back tomorrow!</p>';
        return;
      }

      list.innerHTML = dates.map(date => {
        const wasPlayed = played[date];
        const playedClass = wasPlayed ? ' played' : '';
        const tick = wasPlayed === 'correct' ? '✓ Correct' : wasPlayed === 'wrong' ? '✗ Played' : '';
        return `
          <a class="archive-item${playedClass}" href="/?date=${date}">
            <span class="archive-date">${formatDate(date)}</span>
            <span class="archive-meta">
              <span class="played-tick">${tick}</span>
              <span class="archive-chevron">›</span>
            </span>
          </a>`;
      }).join('');
    }

    render();
  
    // ── Burger menu ────────────────────────────────────────────────────
    function toggleMenu() {
      document.getElementById('burgerBtn').classList.toggle('open');
      document.getElementById('navMenu').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('header')) {
        document.getElementById('burgerBtn').classList.remove('open');
        document.getElementById('navMenu').classList.remove('open');
      }
    });
</script>
</body>
</html>
